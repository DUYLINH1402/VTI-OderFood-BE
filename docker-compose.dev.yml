# ===========================================
# Docker Compose cho Development
# Chỉ chạy MySQL và Redis, backend chạy locally với IDE
# ===========================================

version: '3.8'

services:
  # ===========================================
  # MySQL Database
  # ===========================================
  mysql:
    image: mysql:8.0
    container_name: foodorder-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: food_ordering_system
      MYSQL_USER: foodorder
      MYSQL_PASSWORD: foodorder123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - foodorder-network-dev
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===========================================
  # Redis Cache
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: foodorder-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - foodorder-network-dev

  # ===========================================
  # phpMyAdmin (tùy chọn - quản lý DB qua web)
  # ===========================================
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: foodorder-phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "8080:80"
    networks:
      - foodorder-network-dev

networks:
  foodorder-network-dev:
    driver: bridge

volumes:
  mysql_data_dev:
    driver: local
  redis_data_dev:
    driver: local

